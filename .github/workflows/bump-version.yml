name: Auto Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dashboard/version.json'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate and Bump Version
        run: |
          VERSION=$(jq -r '.version' dashboard/version.json)
          echo "Current Version: $VERSION"
          
          # Separar por puntos
          IFS='.' read -ra ADDR <<< "$VERSION"
          LEN=${#ADDR[@]}
          
          if [ $LEN -eq 3 ]; then
            # X.Y.Z -> X.Y.(Z+1)
            MAJOR=${ADDR[0]}
            MINOR=${ADDR[1]}
            PATCH=${ADDR[2]}
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          elif [ $LEN -eq 2 ]; then
            # X.Y -> X.(Y+1)
            MAJOR=${ADDR[0]}
            MINOR=${ADDR[1]}
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR"
          else
            # Fallback simple
            NEW_VERSION="$VERSION.1"
          fi
          
          echo "New Version: $NEW_VERSION"
          
          # Actualizar version.json
          jq ".version = \"$NEW_VERSION\"" dashboard/version.json > tmp.json && mv tmp.json dashboard/version.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/version.json
          git commit -m "chore: bump version to v$(jq -r '.version' dashboard/version.json) [skip ci]"
          git push origin main
